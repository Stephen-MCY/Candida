<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Special Dress-Up Girl</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600&display=swap');

        :root {
            --barbie-pink: #ff007f;
            --bisque-beige: #f9f4f0; /* Matches the anime site background */
            --accent-pink: #ff85a1;
            --text-color: #4a4a4a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bisque-beige);
            overflow: hidden;
        }

        /* --- Spy x Family Style Intro with Silhouette --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
            cursor: pointer;
        }

        .intro-content {
            text-align: center; color: white;
        }

        .silhouette {
            width: 300px;
            /* This makes the Marin image look like a white silhouette */
            filter: brightness(0) invert(1);
            opacity: 0.3;
            margin-bottom: -50px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        .intro-logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem; font-weight: 900; letter-spacing: 8px;
            border-top: 2px solid white; border-bottom: 2px solid white;
            padding: 10px 0; margin-top: 20px;
        }

        /* --- Main Site Styling (Bisque Doll Aesthetic) --- */
        .main-content {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; opacity: 0; transition: opacity 1.5s ease;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* Subtle texture */
        }

        .container {
            width: 85%; max-width: 600px; padding: 60px;
            background: white; border: 1px solid #eee;
            text-align: left; position: relative; z-index: 10;
            box-shadow: 20px 20px 0px var(--accent-pink);
        }

        h1 { 
            font-family: 'Playfair Display', serif; font-size: 2.5rem; 
            color: var(--barbie-pink); margin: 0; font-style: italic;
        }

        .subtitle {
            text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem;
            color: #aaa; margin-bottom: 30px; display: block;
        }

        p { color: var(--text-color); line-height: 2; font-size: 0.95rem; }

        .btn-group { margin-top: 40px; display: flex; gap: 20px; }

        .btn {
            background: var(--text-color); color: white; border: none;
            padding: 15px 30px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.8rem; cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: var(--barbie-pink); transform: translateY(-3px); }

        /* --- Marin PNG Placement --- */
        .marin-character {
            position: fixed; bottom: -20px; right: 0%;
            width: 450px; z-index: 100; pointer-events: none;
            transition: transform 0.5s ease;
        }

        .marin-img { width: 100%; filter: drop-shadow(-10px 0 20px rgba(0,0,0,0.1)); }

        .speech-bubble {
            position: absolute; top: 10%; left: -20%;
            background: white; border: 2px solid var(--barbie-pink);
            padding: 15px; border-radius: 50% 50% 50% 0;
            font-weight: 600; color: var(--barbie-pink); display: none;
            box-shadow: 5px 5px 0px var(--accent-pink);
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .marin-character { width: 300px; right: -50px; }
            .container { padding: 30px; }
            .intro-logo { font-size: 2rem; }
        }

        #no-btn { position: absolute; background: white; color: #ccc; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startExperience()">
        <div class="intro-content">
            <img src="https://static.wikia.nocookie.net/p__/images/6/65/Kitagawa_Marin-.png" class="silhouette" alt="Silhouette">
            <div class="intro-logo">MARIN x BARBIE</div>
            <p style="letter-spacing: 5px; font-size: 0.8rem; margin-top: 20px;">CLICK TO START THE SHOW</p>
        </div>
    </div>

    <div class="main-content" id="main-site">
        <div class="container">
            <span class="subtitle">Personal Project // 2024</span>
            <h1>The Most Dynamic Girl in the World</h1>
            <p id="msg-text">
                Some people are just born with a spark that makes the world brighter. 
                You are my real-life Marin, my perfect Barbie, and the person who makes every day feel like a special event.
            </p>
            
            <div id="reason-display" style="margin-top: 20px; font-weight: 600; color: var(--barbie-pink); min-height: 30px;"></div>

            <div class="btn-group">
                <button class="btn" onclick="nextReason()">Next Reason</button>
                <button class="btn" style="background: var(--barbie-pink);" onclick="accepted()">I Love You</button>
            </div>
            
            <button id="no-btn" class="btn" onmouseover="dodge()">Not feeling it</button>
        </div>
    </div>

    <div class="marin-character">
        <div id="bubble" class="speech-bubble">TOO CUTE! ✨</div>
        <img src="https://static.wikia.nocookie.net/p__/images/6/65/Kitagawa_Marin-.png" class="marin-img" alt="Marin Kitagawa">
    </div>

    <script>
        function startExperience() {
            const intro = document.getElementById('intro-overlay');
            const main = document.getElementById('main-site');
            
            intro.style.transform = 'translateY(-100%)';
            main.style.opacity = '1';
        }

        const reasons = [
            "Your energy is absolutely infectious.",
            "I love how you're always 100% yourself.",
            "You have the most beautiful heart I've ever known.",
            "Every moment with you is a new favorite memory."
        ];
        let idx = 0;

        function nextReason() {
            document.getElementById('reason-display').innerText = reasons[idx];
            document.getElementById('bubble').style.display = 'block';
            idx = (idx + 1) % reasons.length;
            setTimeout(() => { document.getElementById('bubble').style.display = 'none'; }, 2000);
        }

        function dodge() {
            const btn = document.getElementById('no-btn');
            btn.style.left = Math.random() * 70 + '%';
            btn.style.top = Math.random() * 70 + '%';
        }

        function accepted() {
            document.querySelector('.container').innerHTML = `
                <span class="subtitle">Final Status</span>
                <h1>Perfect Match! ✨</h1>
                <p>I knew you were the one. You're stuck with me and Marin now!</p>
                <button class="btn" onclick="location.reload()">Back to Start</button>
            `;
            document.getElementById('bubble').innerText = "YAY! DYNAMIC!";
            document.getElementById('bubble').style.display = 'block';
        }
    </script>
</body>
</html>
