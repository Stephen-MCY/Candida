<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person | Special Site</title>
    <style>
        :root {
            --barbie-pink: #ff007f;
            --soft-pink: #fff0f6;
            --text-dark: #333;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: white; overflow: hidden;
        }

        /* --- Spy x Family Style Intro --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.86, 0, 0.07, 1);
        }

        .intro-content {
            color: white; text-align: center;
        }

        .intro-logo {
            font-size: 3rem; font-weight: 900; letter-spacing: 5px;
            border: 4px solid white; padding: 10px 30px; text-transform: uppercase;
        }

        /* --- Main Site Styling (Bisque Doll Style) --- */
        .main-content {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
            background: radial-gradient(circle, #fff 0%, var(--soft-pink) 100%);
            opacity: 0; transform: scale(1.1);
            transition: opacity 1s ease, transform 1s ease;
        }

        .container {
            width: 90%; max-width: 500px; padding: 40px;
            background: white; border-top: 8px solid var(--barbie-pink);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;
            position: relative; z-index: 10;
        }

        h1 { font-size: 1.8rem; color: var(--barbie-pink); letter-spacing: 2px; margin-bottom: 20px; }
        p { color: var(--text-dark); line-height: 1.8; font-size: 1rem; }

        .btn {
            background: transparent; border: 2px solid var(--barbie-pink);
            color: var(--barbie-pink); padding: 12px 30px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s; margin-top: 20px;
        }

        .btn:hover { background: var(--barbie-pink); color: white; }

        /* --- Marin Floating Style --- */
        .marin-box {
            position: fixed; bottom: 0; right: 5%; width: 280px; z-index: 50;
        }
        .marin-img { width: 100%; }

        .speech-bubble {
            position: absolute; top: -40px; left: -20px;
            background: var(--barbie-pink); color: white;
            padding: 10px 20px; border-radius: 5px; font-size: 0.8rem;
            display: none; font-weight: bold;
        }

        /* --- Interaction Effects --- */
        .heart { position: absolute; color: var(--barbie-pink); pointer-events: none; }

        @keyframes floatUp {
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        #no-btn { position: absolute; font-size: 0.8rem; border-color: #ccc; color: #999; }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startExperience()">
        <div class="intro-content">
            <div class="intro-logo">BARBIE x MARIN</div>
            <p style="color: white; margin-top: 20px;">CLICK TO ENTER</p>
        </div>
    </div>

    <div class="main-content" id="main-site">
        <div class="container">
            <h1>Special Delivery ❤️</h1>
            <p id="msg-text">You are the most dynamic, dazzling person I know. Every day with you feels like a fairytale.</p>
            
            <button class="btn" onclick="nextReason()">Reveal a Reason</button>
            <div id="reason-display" style="margin-top: 15px; font-style: italic; color: #ff007f;"></div>

            <p style="margin-top: 40px; font-size: 0.8rem; color: #999;">Do you accept this special invitation?</p>
            <button class="btn" onclick="accepted()">Yes</button>
            <button class="btn" id="no-btn" onmouseover="dodge()">No</button>
        </div>
    </div>

    <div class="marin-box">
        <div id="bubble" class="speech-bubble">SO DYNAMIC!</div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiQcSLM4frKOr1BSuxy_-ENGXLzVvrjH0Wsw&s" class="marin-img">
    </div>

    <script>
        function startExperience() {
            const intro = document.getElementById('intro-overlay');
            const main = document.getElementById('main-site');
            
            // Slide up intro (Spy x Family style)
            intro.style.transform = 'translateY(-100%)';
            main.style.opacity = '1';
            main.style.transform = 'scale(1)';
        }

        const reasons = [
            "Your smile is my favorite view.",
            "You make everything more fun.",
            "I love your passion for the things you enjoy.",
            "You're my real-life Barbie."
        ];
        let idx = 0;

        function nextReason() {
            document.getElementById('reason-display').innerText = reasons[idx];
            document.getElementById('bubble').style.display = 'block';
            idx = (idx + 1) % reasons.length;
            spawnHeart();
            setTimeout(() => { document.getElementById('bubble').style.display = 'none'; }, 2000);
        }

        function dodge() {
            const btn = document.getElementById('no-btn');
            btn.style.left = Math.random() * 80 + '%';
            btn.style.top = Math.random() * 80 + '%';
        }

        function accepted() {
            document.querySelector('.container').innerHTML = "<h1>It's Official!</h1><p>You're my favorite person forever. Let's make more memories!</p>";
            document.getElementById('bubble').innerText = "YAY! GOALS!";
            document.getElementById('bubble').style.display = 'block';
            for(let i=0; i<30; i++) setTimeout(spawnHeart, i * 100);
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.innerHTML = '💖';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.bottom = '0';
            h.style.fontSize = (Math.random() * 20 + 20) + 'px';
            h.style.animation = `floatUp ${Math.random() * 2 + 3}s forwards`;
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
    </script>
</body>
</html>
