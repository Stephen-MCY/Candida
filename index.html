<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Bebe Darling - Magazine Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap');

        :root {
            --barbie-pink: #ff007f;
            --bisque-beige: #f9f4f0;
            --accent-pink: #ff85a1;
            --text-color: #4a4a4a;
            --btn-highlight: #ff3399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; min-height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bisque-beige);
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png');
            overflow-x: hidden;
        }

        /* --- Background Particles --- */
        #particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .particle { position: absolute; bottom: -20px; animation: floatUp var(--duration) linear infinite; opacity: 0.6; color: var(--barbie-pink); }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Intro Overlay --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
            cursor: pointer;
        }
        .intro-content { position: relative; text-align: center; color: white; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .silhouette { width: 180px; filter: brightness(0) invert(1); opacity: 0.3; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .intro-logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 10vw, 4rem); 
            font-weight: 900; line-height: 1; text-transform: uppercase;
            border-bottom: 8px solid white; padding-bottom: 5px; margin-top: 10px; font-style: italic;
        }

        /* --- Main Content Layout --- */
        .main-content { opacity: 0; transition: opacity 1.5s ease; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }

        /* --- HERO BANNER: Magazine Spread Style (Desktop) --- */
        .magazine-hero {
            width: 100%; height: 60vh; background: #fff; position: relative; overflow: hidden;
            border-bottom: 6px solid var(--barbie-pink);
            display: grid; grid-template-columns: 1.2fr 1fr; /* 2-column magazine split */
            align-items: end;
        }
