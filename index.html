<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bebe Darling <3</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh; background: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; text-align: center;
        }

        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 10;
            max-width: 400px; position: relative;
        }

        h1 { color: #ff4d6d; }
        p { color: #555; line-height: 1.6; }

        .btn {
            background: #ff4d6d; color: white; border: none;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-size: 1rem; transition: transform 0.2s; margin: 10px;
        }

        .btn:hover { transform: scale(1.1); }

        #no-btn { position: absolute; background: #aaa; z-index: 20; }

        /* Marin Kitagawa Styling */
        .marin-container {
            position: fixed; bottom: 0; right: 10px;
            width: 220px; z-index: 100; pointer-events: none;
        }

        .marin-img { 
            width: 100%; 
            filter: drop-shadow(5px 5px 15px rgba(255, 77, 109, 0.3)); 
        }

        .speech-bubble {
            position: absolute; top: -40px; left: -30px;
            background: white; padding: 10px; border-radius: 15px;
            border: 2px solid #ff4d6d; font-size: 0.85rem; font-weight: bold;
            display: none; width: 140px; box-shadow: 5px 5px 0px #ff4d6d;
            z-index: 101;
        }

        .heart {
            position: absolute; color: #ff4d6d; font-size: 20px;
            user-select: none; animation: float 4s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <h1>Hi Beautiful! ❤️</h1>
        <p id="message">I made this little space just to tell you how much you mean to me.</p>
        <button class="btn" onclick="revealReason()">Click for a reason I love you</button>
        <div id="extra-content" style="margin-top: 20px; font-weight: bold; color: #ff4d6d; min-height: 40px;"></div>
        
        <p style="margin-top: 30px;">Do you love me too?</p>
        <button class="btn" onclick="sayYes()">Yes!</button>
        <button class="btn" id="no-btn" onmouseover="moveButton()">No</button>
    </div>

    <div class="marin-container">
        <div id="bubble" class="speech-bubble">Gosh, that's so sweet! ✨</div>
        <img src="https://i.postimg.co/0yM7pXm8/marin-render.png" class="marin-img" alt="Marin Kitagawa">
    </div>

    <script>
        const reasons = [
            "Your smile lights up my entire world.",
            "You make me a better person every day.",
            "I love the way you laugh at my silly jokes.",
            "You are my safest place and my biggest adventure."
        ];
        
        const marinQuotes = [
            "Gosh, so sweet! ✨",
            "Aww, look at that!",
            "Waaa! So romantic!",
            "You two are goals! ❤️"
        ];

        let reasonIndex = 0;

        function revealReason() {
            const display = document.getElementById('extra-content');
            const bubble = document.getElementById('bubble');
            
            display.innerText = reasons[reasonIndex];
            bubble.innerText = marinQuotes[reasonIndex % marinQuotes.length];
            bubble.style.display = 'block';
            
            reasonIndex = (reasonIndex + 1) % reasons.length;
            createHeart();
            
            setTimeout(() => { bubble.style.display = 'none'; }, 3000);
        }

        function moveButton() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function sayYes() {
            document.getElementById('main-card').innerHTML = "<h1>I knew it! ❤️</h1><p>You're stuck with me forever now. Marin and I both think you're the best!</p>";
            document.getElementById('bubble').innerText = "YAY! IT'S OFFICIAL!";
            document.getElementById('bubble').style.display = 'block';
            for(let i=0; i<30; i++) setTimeout(createHeart, i * 100);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
