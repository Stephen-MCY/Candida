<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Special Dress-Up Girl</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600&display=swap');

        :root {
            --barbie-pink: #ff007f;
            --bisque-beige: #f9f4f0;
            --accent-pink: #ff85a1;
            --text-color: #4a4a4a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; min-height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bisque-beige);
            overflow-x: hidden;
        }

        /* --- Background Particles --- */
        #particles-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .particle {
            position: absolute; bottom: -20px;
            animation: floatUp var(--duration) linear infinite;
            opacity: 0.6; color: var(--barbie-pink);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Intro Overlay --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .intro-content { text-align: center; color: white; padding: 20px; cursor: pointer; }
        .silhouette { width: 180px; filter: brightness(0) invert(1); opacity: 0.3; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* --- Main Content --- */
        .main-content {
            opacity: 0; transition: opacity 1.5s ease;
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 2;
        }

        .hero-banner {
            width: 100%; height: 50vh;
            background: #fff; position: relative; overflow: hidden;
            border-bottom: 5px solid var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
        }

        .hero-bg-collage {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: space-around; align-items: center;
            opacity: 0.6;
        }

        .hero-img { 
            height: 100%; object-fit: contain; 
            animation: softFloat 4s ease-in-out infinite alternate;
        }
        .hero-img:nth-child(2) { animation-delay: 2s; }

        @keyframes softFloat {
            from { transform: translateY(5px); }
            to { transform: translateY(-15px); }
        }

        .hero-title {
            z-index: 5; text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px; border: 2px dashed var(--barbie-pink);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .content-section {
            width: 90%; max-width: 600px;
            margin: -50px auto 50px; padding: 35px;
            background: white; z-index: 10; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .washi-tape {
            position: absolute; top: -15px; left: 15%;
            width: 120px; height: 35px;
            background: rgba(255, 0, 127, 0.3);
            transform: rotate(-3deg);
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--barbie-pink); font-style: italic; }
        
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn {
            background: var(--text-color); color: white; border: none;
            padding: 15px; font-weight: 600; text-transform: uppercase;
            font-size: 0.75rem; cursor: pointer; flex: 1; transition: 0.3s;
        }
        .btn:hover { background: var(--barbie-pink); transform: translateY(-2px); }

        /* Polaroid Gallery Section */
        .gallery {
            width: 90%; max-width: 600px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 100px;
        }

        .polaroid {
            background: white; padding: 10px 10px 30px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: rotate(var(--rot)); transition: 0.3s;
        }
        .polaroid:hover { transform: rotate(0deg) scale(1.05); z-index: 20; }
        .polaroid img { width: 100%; height: 150px; object-fit: cover; background: #eee; }

        .marin-float {
            position: fixed; bottom: -10px; right: -10px;
            width: 250px; z-index: 100; pointer-events: none;
        }

        @media (max-width: 768px) {
            .hero-banner { height: 40vh; }
            .content-section { margin-top: -30px; }
            .gallery { grid-template-columns: 1fr; }
            .marin-float { width: 180px; }
        }
    </style>
</head>
<body>

    <div id="particles-container"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-overlay" onclick="startExperience()">
        <div class="intro-content">
            <img src="marin.png" class="silhouette">
            <div class="intro-logo">MARIN x BARBIE</div>
            <p style="letter-spacing: 3px; font-size: 0.65rem; margin-top: 15px;">TAP TO START THE MUSIC</p>
        </div>
    </div>

    <div class="main-content" id="main-site">
        <header class="hero-banner">
            <div class="hero-bg-collage">
                <img src="marin2.png" class="hero-img">
                <img src="marin3.png" class="hero-img">
            </div>
            <div class="hero-title">
                <span class="subtitle">Fashion Edition 2026</span>
                <h2 style="margin:0; font-family: 'Playfair Display'; color:#ff007f;">My Love Story</h2>
            </div>
        </header>

        <main class="content-section">
            <div class="washi-tape"></div>
            <span class="subtitle">Entry // 01</span>
            <h1>The Most Dynamic Girl</h1>
            <p>I love you like a love song, baby! You're my real-life Marin and my perfect Barbie. Every day with you is a hit single.</p>
            
            <div id="reason-display" style="color: var(--barbie-pink); font-weight: 600; margin: 15px 0; min-height: 24px;"></div>

            <div class="btn-group">
                <button class="btn" onclick="nextReason()">Next Reason</button>
                <button class="btn" style="background: var(--barbie-pink);" onclick="accepted()">I Love You</button>
            </div>
        </main>

        <div class="gallery">
            <div class="polaroid" style="--rot: -3deg">
                <img src="marin2.png">
                <p style="font-size: 0.7rem; margin-top: 10px;">Dazzling Energy</p>
            </div>
            <div class="polaroid" style="--rot: 2deg">
                <img src="marin3.png">
                <p style="font-size: 0.7rem; margin-top: 10px;">Dynamic Style</p>
            </div>
        </div>
    </div>

    <div class="marin-float">
        <img src="marin.png" style="width:100%;">
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles-container');
            const items = ['💖', '✨', '🌸', '🎀'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = items[Math.floor(Math.random() * items.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                p.style.setProperty('--duration', (Math.random() * 3 + 4) + 's');
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        function startExperience() {
            document.getElementById('intro-overlay').style.transform = 'translateY(-100%)';
            document.getElementById('main-site').style.opacity = '1';
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio play blocked"));
        }

        const reasons = [
            "Your energy is absolutely infectious.",
            "I love how you're always 100% yourself.",
            "You have the most beautiful heart.",
            "You're the melody to my favorite song!"
        ];
        let idx = 0;

        function nextReason() {
            document.getElementById('reason-display').innerText = reasons[idx];
            idx = (idx + 1) % reasons.length;
        }

        function accepted() {
            document.querySelector('.content-section').innerHTML = `
                <span class="subtitle">Status: Eternal</span>
                <h1>Forever & Always ✨</h1>
                <p>I repeat, I love you like a love song! You're my favorite girl.</p>
                <button class="btn" onclick="location.reload()">Replay</button>
            `;
        }
    </script>
</body>
</html>
