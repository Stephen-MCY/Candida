<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Special Dress-Up Girl</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600&display=swap');

        :root {
            --barbie-pink: #ff007f;
            --bisque-beige: #f9f4f0;
            --accent-pink: #ff85a1;
            --text-color: #4a4a4a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; min-height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bisque-beige);
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png');
            overflow-x: hidden; /* Prevent horizontal scroll on mobile */
        }

        /* --- Intro Overlay (Kept as requested) --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .intro-content { text-align: center; color: white; padding: 20px; cursor: pointer; }
        .silhouette { width: 180px; filter: brightness(0) invert(1); opacity: 0.3; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* --- Main Page Layout --- */
        .main-content {
            opacity: 0; transition: opacity 1s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Hero Banner Section */
        .hero-banner {
            width: 100%;
            height: 45vh; /* Half screen on mobile */
            background: #fff;
            position: relative;
            overflow: hidden;
            border-bottom: 5px solid var(--barbie-pink);
            display: flex; justify-content: center; align-items: center;
        }

        .hero-bg-collage {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: space-around; align-items: center;
            opacity: 0.2; /* Subtle background look */
            filter: grayscale(30%);
        }

        .hero-img { height: 110%; object-fit: contain; }

        .hero-title {
            z-index: 5; text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px; border: 2px dashed var(--barbie-pink);
        }

        /* Content Section */
        .content-section {
            width: 90%; max-width: 600px;
            margin: -40px auto 40px; /* Overlap the banner slightly */
            padding: 30px;
            background: white;
            z-index: 10;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Fashion elements / Decorations */
        .washi-tape {
            position: absolute; top: -15px; left: 20%;
            width: 100px; height: 30px;
            background: rgba(255, 0, 127, 0.4);
            transform: rotate(-5deg);
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--barbie-pink); font-style: italic; font-size: 1.8rem; }
        .subtitle { text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; color: #aaa; }

        /* Buttons */
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn {
            background: var(--text-color); color: white; border: none;
            padding: 15px; font-weight: 600; text-transform: uppercase;
            font-size: 0.75rem; cursor: pointer; flex: 1;
        }
        .btn-love { background: var(--barbie-pink); }

        /* Floating Marin (marin.png) */
        .marin-float {
            position: fixed; bottom: -10px; right: -10px;
            width: 220px; z-index: 100; pointer-events: none;
        }

        @media (min-width: 768px) { /* Tablet/iPad & Desktop */
            .hero-banner { height: 60vh; }
            .hero-bg-collage { opacity: 0.6; }
            .content-section { margin-top: -80px; padding: 50px; }
            .marin-float { width: 350px; }
        }

        @media (max-width: 480px) {
            .marin-float { width: 160px; right: -20px; opacity: 0.8; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startExperience()">
        <div class="intro-content">
            <img src="marin.png" class="silhouette">
            <div class="intro-logo">MARIN x BARBIE</div>
            <p style="letter-spacing: 3px; font-size: 0.65rem; margin-top: 15px;">TAP TO START</p>
        </div>
    </div>

    <div class="main-content" id="main-site">
        <header class="hero-banner">
            <div class="hero-bg-collage">
                <img src="marin2.png" class="hero-img">
                <img src="marin3.png" class="hero-img">
            </div>
            <div class="hero-title">
                <span class="subtitle">Spring Collection 2026</span>
                <h2 style="margin:0; font-family: 'Playfair Display'; color:#ff007f;">Dazzling Style</h2>
            </div>
        </header>

        <main class="content-section">
            <div class="washi-tape"></div>
            <span class="subtitle">Special Entry // 01</span>
            <h1>The Most Dynamic Girl</h1>
            <p>You’re my real-life Marin and my perfect Barbie. Every day with you is a new favorite memory.</p>
            
            <div id="reason-display" style="color: var(--barbie-pink); font-weight: 600; margin: 15px 0;"></div>

            <div class="btn-group">
                <button class="btn" onclick="nextReason()">Next Reason</button>
                <button class="btn btn-love" onclick="accepted()">I Love You</button>
            </div>
        </main>
    </div>

    <div class="marin-float">
        <img src="marin.png" style="width:100%;">
    </div>

    <script>
        function startExperience() {
            document.getElementById('intro-overlay').style.transform = 'translateY(-100%)';
            document.getElementById('main-site').style.opacity = '1';
        }

        const reasons = [
            "Your energy is absolutely infectious.",
            "I love how you're always 100% yourself.",
            "You have the most beautiful heart.",
            "You make every outfit look like a dream!"
        ];
        let idx = 0;

        function nextReason() {
            document.getElementById('reason-display').innerText = reasons[idx];
            idx = (idx + 1) % reasons.length;
        }

        function accepted() {
            document.querySelector('.content-section').innerHTML = `
                <span class="subtitle">Status: Complete</span>
                <h1>Perfect Match! ✨</h1>
                <p>I knew you were the one. You're my favorite Barbie forever.</p>
                <button class="btn" onclick="location.reload()">Back</button>
            `;
        }
    </script>
</body>
</html>
