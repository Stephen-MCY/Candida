<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bebe Darling <3</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            /* Barbie Pink Gradient Background */
            background: linear-gradient(135deg, #FF99D6 0%, #FF66CC 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 102, 204, 0.4); z-index: 10;
            max-width: 400px; position: relative;
            border: 3px solid #ff66cc; /* Strong Barbie pink border */
        }

        h1 { color: #ff007f; text-shadow: 1px 1px 2px #fff, -1px -1px 2px #ff66cc; } /* Sparkle effect */
        p { color: #880044; line-height: 1.6; font-weight: bold; }

        .btn {
            background: #ff007f; color: white; border: none;
            padding: 12px 24px; border-radius: 50px; cursor: pointer;
            font-size: 1.1rem; transition: transform 0.2s, background 0.2s; margin: 10px;
            font-weight: bold;
            box-shadow: 0 5px 0 #cc0066;
        }

        .btn:hover { transform: translateY(-3px); background: #ff3399;}
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #cc0066; }

        #runaway-btn { position: absolute; background: #ddd; z-index: 20; border: 1px solid #aaa; color: #555; }

        /* Marin Kitagawa Styling */
        .marin-container {
            position: fixed; bottom: 0; right: 10px;
            width: 250px; z-index: 100; pointer-events: none;
        }

        .marin-img { 
            width: 100%; 
            filter: drop-shadow(5px 5px 15px rgba(255, 102, 204, 0.5)); 
        }

        .speech-bubble {
            position: absolute; top: -50px; left: -20px;
            background: white; padding: 12px; border-radius: 18px;
            border: 3px solid #ff007f; font-size: 0.9rem; font-weight: bold;
            display: none; width: 150px; box-shadow: 5px 5px 0px #ff66cc;
            z-index: 101; color: #ff007f;
        }

        /* Barbie Hearts Styling */
        .heart {
            position: absolute; font-size: 20px;
            user-select: none; animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <h1>Hello Barbie Girl! 🎀</h1>
        <p id="message">You look absolutely dynamic today! I made this magical space just for you.</p>
        <button class="btn" onclick="revealReason()">Tell me something lovely</button>
        <div id="extra-content" style="margin-top: 20px; font-weight: bold; color: #ff007f; min-height: 50px;"></div>
        
        <p style="margin-top: 30px;">Do you want a pink sparky rose? ✨</p>
        <button class="btn" onclick="sayYes()">Yes, please!</button>
        <button class="btn" id="runaway-btn" onmouseover="moveButton()">Ew, not a chance.</button>
    </div>

    <div class="marin-container">
        <div id="bubble" class="speech-bubble">Aww, my gosh! Dynamic! ✨</div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiQcSLM4frKOr1BSuxy_-ENGXLzVvrjH0Wsw&s" class="marin-img" alt="Marin Kitagawa">
    </div>

    <script>
        const reasons = [
            "Your energy is more dazzling than any diamond.",
            "You make the world more colorful just by being in it.",
            "I love how we can always create a new adventure together.",
            "You are my absolute favorite fairytale."
        ];
        
        const marinQuotes = [
            "My gosh! Dazzling!",
            "Look at that shine! ✨",
            "Waaa! Totally dynamic!",
            "Eeee! I'm melting! ❤️"
        ];

        let reasonIndex = 0;

        // Custom pink heart options
        const heartColors = ['#ff99d6', '#ff66cc', '#ff3399', '#ff007f'];

        function revealReason() {
            const display = document.getElementById('extra-content');
            const bubble = document.getElementById('bubble');
            
            display.innerText = reasons[reasonIndex];
            bubble.innerText = marinQuotes[reasonIndex % marinQuotes.length];
            bubble.style.display = 'block';
            
            reasonIndex = (reasonIndex + 1) % reasons.length;
            createHeart();
            
            setTimeout(() => { bubble.style.display = 'none'; }, 3000);
        }

        function moveButton() {
            const btn = document.getElementById('runaway-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function sayYes() {
            document.getElementById('main-card').innerHTML = "<h1>Dazzling! ✨</h1><p>You accepted the rose! Marin and I knew you were the perfect Barbie. You're my princess forever!</p>";
            document.getElementById('bubble').innerText = "YAY! DYNAMIC CHOICE!";
            document.getElementById('bubble').style.display = 'block';
            for(let i=0; i<40; i++) setTimeout(createHeart, i * 100);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '💖'; /* Pink Sparkle Heart */
            heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    </script>
</body>
</html>
